name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q

  package:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create build
        run: |
          mkdir -p build
          cp *.py requirements.txt build/
          cd build && zip -r ../app.zip .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.zip
