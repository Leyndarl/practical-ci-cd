name: CI-CD

on:
  push:
    branches: [ "main" ]  # или master, если у тебя так

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        run: pytest -v  # -v для более подробного вывода

  package:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create build artifact
        run: |
          mkdir -p build
          # Копируем все .py файлы и requirements.txt (если есть)
          cp -r *.py requirements.txt build/ 2>/dev/null || : # Игнорируем ошибку, если файлов нет
          cd build && zip -r app.zip .
          cd .. && mv build/app.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ github.sha }}  # Уникальное имя по коммиту
          path: app.zip
